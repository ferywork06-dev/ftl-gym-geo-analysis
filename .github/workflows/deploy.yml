name: Deploy FTL Reviews Dashboard to Cloud Run

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: webserver-435507

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast2-docker.pkg.dev

      - name: Set image tag from commit SHA
        run: echo "IMAGE_TAG=asia-southeast2-docker.pkg.dev/webserver-435507/ftlgym-repo/marketing-google-reviews:${{ github.sha }}" >> $GITHUB_ENV

      - name: Build and Push Docker image
        run: |
          docker build --no-cache -t "$IMAGE_TAG" \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            .
          docker push "$IMAGE_TAG"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy marketing-google-reviews \
            --image "$IMAGE_TAG" \
            --region asia-southeast2 \
            --platform managed \
            --allow-unauthenticated \
            --service-account ftlgym-cloudrun@webserver-435507.iam.gserviceaccount.com \
            --port 8080 \
            --set-env-vars "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}" \
            --quiet
